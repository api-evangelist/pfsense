aid: pfsense
name: pfSense
description: >-
  pfSense is an open-source firewall and router operating system based on
  FreeBSD, developed and maintained by Netgate, providing stateful firewall,
  routing, VPN (IPsec, OpenVPN, WireGuard), captive portal, traffic shaping,
  and IDS/IPS capabilities for home and enterprise networks. It is available
  as pfSense Community Edition (CE) and pfSense Plus, both managed via a web
  UI. The unofficial pfSense-pkg-RESTAPI package adds a REST and GraphQL API
  with 200+ endpoints under /api/v2 for automating firewall management,
  authenticated via local users, API keys, or JWT.
type: Index
image: https://kinlane-productions.s3.amazonaws.com/apis-json/apis-json-logo.jpg
tags:
