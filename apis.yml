apis:
  - aid: pfsense:rest-api-package
    name: pfSense REST API (pfSense-pkg-RESTAPI)
    description: >-
      Community-maintained REST and GraphQL API package for pfSense CE and
      pfSense Plus exposing 200+ endpoints under /api/v2 for firewall,
      interface, service, user, and system management. Authentication
      supports local user credentials, API keys, and JWT bearer tokens; the
      base URL is the pfSense instance's own hostname.
    humanURL: https://pfrest.org/
    baseURL: https://pfsense.local/api/v2
