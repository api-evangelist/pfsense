features:
  - name: Stateful Firewall
    description: >-
      pf-based stateful packet filtering with aliases, schedules, and
      floating rules for granular network policy.
  - name: VPN Services
    description: >-
      Built-in IPsec, OpenVPN, and WireGuard VPN servers and clients for
      site-to-site and remote access connectivity.
  - name: Routing and NAT
    description: >-
      Static and dynamic routing (FRR, BGP, OSPF via packages) plus full
      NAT/PAT/1:1 mapping configuration.
  - name: Traffic Shaping and QoS
    description: >-
      Limiters and HFSC/CBQ/PRIQ queues to prioritize traffic and enforce
      bandwidth policies per host or service.
  - name: IDS/IPS
    description: >-
      Snort and Suricata packages for intrusion detection and prevention,
      with rule subscriptions and per-interface configuration.
  - name: REST/GraphQL API
    description: >-
      Optional pfSense-pkg-RESTAPI package providing programmatic
      configuration of nearly all pfSense subsystems.
